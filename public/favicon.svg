  <!-- Banana shape -->
  <path d="M 20 70 Q 40 20, 80 15 Q 85 15, 85 20 Q 45 25, 25 75 Q 20 78, 15 75 Z" fill="url(#bananaGradient)" stroke="#D4AF37" stroke-width="2"/>
